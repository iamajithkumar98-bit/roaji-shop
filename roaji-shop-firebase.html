<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #f0f0f4;
  --border: #d0d0dc;
  --gold: #c8960a;
  --gold2: #a87800;
  --pink: #d63870;
  --blue: #0077bb;
  --green: #1a8a50;
  --orange: #d46c00;
  --red: #cc2222;
  --purple: #7c3aad;
  --text: #111118;
  --text2: #55556a;
  --radius: 12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Baloo Thambi 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* ===== LOGIN SCREEN ===== */
#loginScreen {
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%, rgba(100,50,200,0.08) 0%, transparent 50%),
             radial-gradient(ellipse at 70% 80%, rgba(200,150,10,0.08) 0%, transparent 50%),
             linear-gradient(135deg, #ededf5 0%, #f8f8ff 50%, #ededf5 100%);
  padding:20px;
}
.login-box {
  background:linear-gradient(145deg,#ffffff,#f4f4fc);border:1px solid rgba(100,50,200,0.2);border-radius:20px;
  padding:36px 32px;width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,0.1), 0 0 40px rgba(100,43,200,0.06);
}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo-icon{font-size:3rem;display:block;margin-bottom:8px;}
.login-logo h1{font-size:1.6rem;font-weight:800;background:linear-gradient(90deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-logo p{color:var(--text2);font-size:0.82rem;margin-top:4px;}
.login-role-tabs{display:flex;gap:8px;margin-bottom:20px;}
.role-tab{
  flex:1;padding:10px;border-radius:10px;border:2px solid var(--border);
  background:var(--surface2);color:var(--text2);font-family:inherit;
  font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;
}
.role-tab.active.owner{border-color:var(--gold);color:var(--gold);background:rgba(245,200,66,0.08);}
.role-tab.active.worker{border-color:var(--blue);color:var(--blue);background:rgba(79,195,247,0.08);}
.role-tab.active.new-owner{border-color:var(--green);color:var(--green);background:rgba(105,240,174,0.08);}
.login-form label{font-size:0.78rem;font-weight:600;color:var(--text2);margin-bottom:4px;display:block;}
.login-form input{
  width:100%;padding:10px 14px;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-family:inherit;font-size:0.92rem;outline:none;
  margin-bottom:14px;transition:border 0.2s;
}
.login-form input:focus{border-color:var(--gold);}
.login-btn{
  width:100%;padding:12px;border:none;border-radius:10px;font-family:inherit;
  font-size:1rem;font-weight:800;cursor:pointer;transition:all 0.2s;margin-top:4px;
}
.login-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.login-btn.owner-btn{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;}
.login-btn.worker-btn{background:linear-gradient(135deg,var(--blue),var(--purple));color:#000;}
.login-btn.new-owner-btn{background:linear-gradient(135deg,var(--green),var(--blue));color:#000;}
.login-info{
  margin-top:14px;padding:10px 14px;background:rgba(255,255,255,0.03);
  border-radius:8px;font-size:0.78rem;color:var(--text2);border:1px solid var(--border);
}
.login-err{color:var(--red);font-size:0.8rem;margin-top:8px;text-align:center;display:none;}

/* ===== APP (main) ===== */
#appScreen{display:none;}
.app-header{
  background:linear-gradient(135deg,#ffffff 0%,#f4f4fc 100%);
  border-bottom:1px solid rgba(100,50,200,0.15);padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;gap:10px;
  box-shadow:0 2px 12px rgba(80,20,180,0.08);
}
